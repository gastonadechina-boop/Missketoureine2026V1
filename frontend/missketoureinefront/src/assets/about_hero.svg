    <polygon points="1100,550 1102,546 1104,550 1108,550 1105,553 1106,557 1102,554 1098,557 1099,553 1096,550" />
    <polygon points="720,120 722,116 724,120 728,120 725,123 726,127 722,124 718,127 719,123 716,120" />
    <polygon points="1300,300 1302,296 1304,300 1308,300 1305,303 1306,307 1302,304 1298,307 1299,303 1296,300" />

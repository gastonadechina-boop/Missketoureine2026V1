      <stop offset="0%" stop-color="#2a1744"/>
      <stop offset="60%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0d0815"/>
    </radialGradient>
    <linearGradient id="ag1" x1="0" y1="0" x2="1" y2="1">
